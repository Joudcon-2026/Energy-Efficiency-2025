<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aramco Energy Efficiency Awards 2025</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111111">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Aramco Awards">

    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #111111;
        }
        iframe { width: 100%; height: 100%; border: none; display: block; }

        /* Install Screen Overlay */
        #install-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #222222 0%, #0a0a0a 100%); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center; padding: 30px; box-sizing: border-box;
        }
        .app-title { font-size: 22px; font-weight: 600; margin-bottom: 5px; color: #ffffff; letter-spacing: 1px; }
        .app-sub { font-size: 13px; color: #aaaaaa; margin-bottom: 35px; letter-spacing: 2px; }
        
        #android-btn {
            display: none; background-color: #008751; color: white; border: none;
            padding: 16px 35px; font-size: 15px; font-weight: 600; border-radius: 30px;
            cursor: pointer; box-shadow: 0 4px 15px rgba(0, 135, 81, 0.4); text-transform: uppercase;
        }

        #ios-instructions {
            display: none; background: #222; padding: 20px; border-radius: 15px;
            border: 1px solid #333; max-width: 290px; font-size: 14px; line-height: 1.5;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); margin-bottom: 60px;
        }
        .icon-accent { color: #008751; font-weight: bold; }

        /* Bouncing Arrow Animation */
        #ios-arrow {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10000;
            animation: bounce 1.2s infinite;
        }

        @keyframes bounce {
            0%, 100% { bottom: 15px; transform: translateX(-50%) scale(1); }
            50% { bottom: 35px; transform: translateX(-50%) scale(1.1); }
        }
    </style>
</head>
<body>

    <!-- Install Screen Overlay -->
    <div id="install-overlay">
        <div class="app-title">ENERGY EFFICIENCY AWARDS</div>
        <div class="app-sub">OFFICIAL BOOKLET</div>
        
        <button id="android-btn">Install to Home Screen</button>
        
        <div id="ios-instructions">
            To view in immersive full-screen app mode:<br><br>
            1. Tap the <span class="icon-accent">Share button</span> at the bottom.<br>
            2. Scroll down and select <span class="icon-accent">"Add to Home Screen"</span>.
        </div>
    </div>

    <!-- Animated Downward Arrow SVG -->
    <div id="ios-arrow">
        <svg width="50" height="50" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 4V20M12 20L5 13M12 20L19 13" stroke="#008751" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </div>

    <!-- The Corrected Direct Booklet URL -->
    <iframe src="https://heyzine.com/flip-book/bbc842b1cc.html" allowfullscreen="true" scrolling="no" allow="fullscreen"></iframe>

    <script>
        const isRunningStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
        const overlay = document.getElementById('install-overlay');
        const androidBtn = document.getElementById('android-btn');
        const iosInstructions = document.getElementById('ios-instructions');
        const iosArrow = document.getElementById('ios-arrow');

        if (isRunningStandalone) {
            overlay.style.display = 'none'; 
            iosArrow.style.display = 'none';
        } else {
            const isiOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            if (isiOS) {
                iosInstructions.style.display = 'block';
                iosArrow.style.display = 'block';
            } else {
                let deferredPrompt;
                window.addEventListener('beforeinstallprompt', (e) => {
                    e.preventDefault();
                    deferredPrompt = e;
                    androidBtn.style.display = 'block';
                });

                androidBtn.addEventListener('click', async () => {
                    if (deferredPrompt) {
                        deferredPrompt.prompt();
                        const { outcome } = await deferredPrompt.userChoice;
                        if (outcome === 'accepted') overlay.style.display = 'none';
                        deferredPrompt = null;
                    }
                });
            }
        }
    </script>
</body>
</html>
