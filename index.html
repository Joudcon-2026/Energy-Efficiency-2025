<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aramco Energy Efficiency Awards 2025</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#008751">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #111111;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        /* Style for the browser instructions */
        #pwa-instructions {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 135, 81, 0.95);
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            z-index: 9999;
            pointer-events: none;
            display: none;
        }
    </style>
</head>
<body>

    <div id="pwa-instructions">
        Tap 'Share' then 'Add to Home Screen' for Full-Screen App Mode
    </div>

    <iframe src="https://heyzine.com/flip-book/bbc842b1cc.html" allowfullscreen="true" scrolling="no"></iframe>

    <script>
        // Register the Service Worker for Web App functionality
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        // Detect if the app is currently running in full-screen standalone mode
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
        
        if (!isStandalone) {
            // Show installation instructions if opened inside standard Safari/Chrome
            document.getElementById('pwa-instructions').style.display = 'block';
            // Hide the banner automatically after 6 seconds
            setTimeout(() => {
                document.getElementById('pwa-instructions').style.opacity = '0';
            }, 6000);
        }
    </script>
</body>
</html>
