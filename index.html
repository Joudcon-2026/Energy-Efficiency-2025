<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aramco Energy Efficiency Awards 2025</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background-color: #0b0b0b;
            width: 100%;

        }

        /* Container that holds the pages */
        .booklet-gallery {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        /* Responsive image styling for mobile screens */
        .page-image {
            width: 100%;
            max-width: 800px; /* Limits size on desktop screens */
            height: auto;
            display: block;
            margin: 0 auto;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="booklet-gallery">
        <!-- Matching file names exactly from image_464181.png -->
        <img src="page-01.jpg" alt="Page 1" class="page-image">
        <img src="page-02.jpg" alt="Page 2" class="page-image">
        <img src="page-03.jpg" alt="Page 3" class="page-image">
        <img src="page-04.jpg" alt="Page 4" class="page-image">
        <img src="page-05.jpg" alt="Page 5" class="page-image">
        <img src="page-06.jpg" alt="Page 6" class="page-image">
        <img src="page-07.jpg" alt="Page 7" class="page-image">
        <img src="page-08.jpg" alt="Page 8" class="page-image">
        <img src="page-09.jpg" alt="Page 9" class="page-image">
        <img src="page-10.jpg" alt="Page 10" class="page-image">
        <img src="page-11.jpg" alt="Page 11" class="page-image">
        <img src="page-12.jpg" alt="Page 12" class="page-image">
        <img src="page-13.jpg" alt="Page 13" class="page-image">

</body>
</html>
